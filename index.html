<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Pro | AI Study, Health Hub & Football Scores</title>
    <meta name="description" content="Nexus Pro: Your all-in-one hub for AI homework help, health insights, and live football updates.">
    <link rel="canonical" href="https://nexus-pro-iota.vercel.app/" />
    <meta name="google-site-verification" content="vcK_Wog8VjBM_8pNG7d2tpqV8ZRceHkVss7mjFxjQE0" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased">

    <header class="bg-gray-900/80 backdrop-blur-md border-b border-gray-800 sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="text-xl font-black tracking-wider text-blue-500">NEXUS PRO</div>
        <nav class="hidden md:flex space-x-6 text-sm font-medium text-gray-300">
            <a href="#" class="hover:text-blue-400">Home</a>
            <a href="#" class="hover:text-blue-400">Assignments</a>
            <a href="#" class="hover:text-blue-400">Health</a>
            <a href="#" class="hover:text-blue-400">Football</a>
        </nav>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-16 text-center">
        <h1 class="text-4xl sm:text-6xl font-extrabold mb-6">Welcome to Nexus Pro</h1>
        <p class="text-gray-400 text-lg mb-8 max-w-2xl mx-auto">Solve. Learn. Connect. Your hub for academics, health, and sports.</p>
    </main>

    <section class="max-w-6xl mx-auto px-4 py-16 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800">
            <div class="relative h-44 overflow-hidden rounded-xl mb-4">
                <img src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=600" class="study-img absolute inset-0 w-full h-full object-cover transition-opacity duration-1000">
                <img src="https://images.unsplash.com/photo-1509224765680-bb62702abe7b?w=600" class="study-img absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 opacity-0">
            </div>
            <h3 class="font-bold text-white">Study & Homework</h3>
        </div>

        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800">
            <div class="relative h-44 overflow-hidden rounded-xl mb-4">
                <img src="https://images.unsplash.com/photo-1505751172876-fa1923c5c5ad?w=600" class="health-img absolute inset-0 w-full h-full object-cover transition-opacity duration-1000">
                <img src="https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?w=600" class="health-img absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 opacity-0">
            </div>
            <h3 class="font-bold text-white">Health Hub</h3>
        </div>

        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800">
            <div class="relative h-44 overflow-hidden rounded-xl mb-4">
                <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=600" class="foot-img absolute inset-0 w-full h-full object-cover transition-opacity duration-1000">
                <img src="https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=600" class="foot-img absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 opacity-0">
            </div>
            <h3 class="font-bold text-white">Football Hub</h3>
        </div>
    </section>

    <section class="max-w-md mx-auto px-4 py-16">
        <form class="bg-gray-900 p-8 rounded-3xl border border-gray-800 space-y-4">
            <h3 class="text-xl font-bold mb-4">Contact Us</h3>
            <input type="text" placeholder="Name" class="w-full bg-gray-950 p-3 rounded-lg border border-gray-800">
            <input type="email" placeholder="Email" class="w-full bg-gray-950 p-3 rounded-lg border border-gray-800">
            <button class="w-full bg-blue-600 py-3 rounded-lg font-bold">Send Message</button>
        </form>
    </section>

    <footer class="border-t border-gray-900 pt-16 pb-8 px-6 text-center text-gray-500 text-xs">
        <p>© 2026 Nexus Pro. Learn. Connect. Stay Healthy.</p>
    </footer>

    <script>
        function setupSlider(className, interval) {
            const images = document.querySelectorAll(className);
            let index = 0;
            setInterval(() => {
                images[index].classList.add('opacity-0');
                index = (index + 1) % images.length;
                images[index].classList.remove('opacity-0');
            }, interval);
        }

        setupSlider('.study-img', 3000);
        setupSlider('.health-img', 3500);
        setupSlider('.foot-img', 4000);
    </script>
</body>
                    </html>
