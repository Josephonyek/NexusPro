<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Pro | AI Study, Health Hub & Football</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        .slider-container { position: relative; height: 176px; overflow: hidden; background: #111827; }
        .slide-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans">

    <header class="bg-gray-900/80 backdrop-blur-md border-b border-gray-800 sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="text-xl font-black text-blue-500">NEXUS PRO</div>
        <nav class="hidden md:flex space-x-6 text-sm font-medium">
            <a href="#" class="hover:text-blue-400">Home</a>
            <a href="#" class="hover:text-blue-400">Assignments</a>
            <a href="#" class="hover:text-blue-400">Health</a>
            <a href="#" class="hover:text-blue-400">Football</a>
        </nav>
        <button id="menu-btn" class="md:hidden p-2 text-gray-400">☰</button>
        <a href="login.html" class="hidden md:block bg-blue-600 px-4 py-2 rounded-lg text-sm font-bold">Explore</a>
    </header>

    <div id="mobile-menu" class="hidden md:hidden bg-gray-900 p-6 space-y-4 text-center">
        <a href="#" class="block">Home</a>
        <a href="#" class="block">Assignments</a>
        <a href="#" class="block">Health</a>
        <a href="#" class="block">Football</a>
    </div>

    <section class="max-w-md mx-auto px-4 py-16">
        <form id="contact-form" class="bg-gray-900 p-8 rounded-3xl border border-gray-800 space-y-4">
            <h3 class="text-xl font-bold">Contact Us</h3>
            <input type="text" name="user_name" placeholder="Name" required class="w-full bg-gray-950 p-3 rounded-lg border border-gray-800">
            <input type="email" name="user_email" placeholder="Email" required class="w-full bg-gray-950 p-3 rounded-lg border border-gray-800">
            <textarea name="message" placeholder="Message" required class="w-full bg-gray-950 p-3 rounded-lg border border-gray-800"></textarea>
            <button type="submit" class="w-full bg-blue-600 py-3 rounded-lg font-bold">Send Message</button>
        </form>
    </section>

    <script>
        // 1. Hamburger Menu
        document.getElementById('menu-btn').addEventListener('click', () => {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });

        // 2. Fast Slider Logic
        function setupSlider(className) {
            const images = document.querySelectorAll(className);
            let index = 0;
            setInterval(() => {
                images[index].style.opacity = '0';
                index = (index + 1) % images.length;
                images[index].style.opacity = '1';
            }, 2000); // Set to 2s for fast switching
        }
        setupSlider('.study-img');
        setupSlider('.health-img');
        setupSlider('.foot-img');

        // 3. EmailJS Form Handling
        (function(){ emailjs.init({ publicKey: "YOUR_PUBLIC_KEY" }); })();
        
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            emailjs.sendForm('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', this)
                .then(() => alert('Message Sent!'), (err) => alert('Error: ' + JSON.stringify(err)));
        });
    </script>
</body>
</html>
