<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Pro | Account Recovery Gateway</title>
    <!-- Icon Font Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-deep: #090d16;
            --glass-panel: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --neon-blue: #3b82f6;
            --neon-glow: rgba(59, 130, 246, 0.2);
            --accent-green: #10b981;
            --accent-green-glow: rgba(16, 185, 129, 0.15);
            --card-bg: rgba(17, 24, 39, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
        }

        /* Glassmorphism Utilities */
        .glass {
            background: var(--glass-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
        }

        /* Top Header Navigation */
        header.nav-header {
            width: 100%;
            height: 75px;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .brand-logo {
            font-weight: 700;
            font-size: 1.4rem;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back-nav {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        .btn-back-nav:hover {
            color: var(--neon-blue);
        }

        /* Centered Authentication Shell Container */
        .auth-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 110px 24px 40px 24px;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            border-top: 4px solid var(--neon-blue);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-icon-wrapper {
            width: 60px;
            height: 60px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: var(--neon-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            margin: 0 auto 15px auto;
        }

        .auth-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.92rem;
            line-height: 1.4;
        }

        /* Form Components */
        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1rem;
            transition: color 0.3s;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 16px 12px 42px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        .form-control:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        
        .form-control:focus + i {
            color: var(--neon-blue);
        }

        .btn-submit-action {
            width: 100%;
            background: var(--neon-blue);
            color: #ffffff;
            border: none;
            padding: 13px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--neon-glow);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-submit-action:hover { background: #2563eb; }
        .btn-submit-action:active { transform: scale(0.99); }

        /* Status Messages Feedback Panels */
        .feedback-panel {
            padding: 14px;
            border-radius: 8px;
            font-size: 0.88rem;
            margin-bottom: 20px;
            display: none;
            align-items: flex-start;
            gap: 10px;
            line-height: 1.4;
        }
        .feedback-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        .feedback-success {
            background: var(--accent-green-glow);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .auth-footer-links {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer-links a {
            color: var(--neon-blue);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer-links a:hover {
            text-decoration: underline;
        }

        /* Minimal Fixed Footer Structural Segment */
        footer.auth-minimal-footer {
            background: var(--bg-deep);
            border-top: 1px solid var(--glass-border);
            padding: 20px 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        @media (max-width: 480px) {
            header.nav-header { padding: 0 20px; }
            .auth-card { padding: 30px 20px; border-radius: 8px; }
        }
    </style>
</head>
<body>

    <!-- Header Navigation Deck -->
    <header class="nav-header">
        <a href="index.html" class="brand-logo">
            <i class="fas fa-cubes" style="color: var(--neon-blue);"></i>Nexus<span style="color:var(--neon-blue)">Pro</span>
        </a>
        <a href="login.html" class="btn-back-nav">
            <i class="fas fa-arrow-left"></i> Return to Login
        </a>
    </header>

    <!-- Main Workspace Processing Terminal -->
    <main class="auth-container">
        
        <div class="auth-card glass">
            <div class="auth-header">
                <div class="auth-icon-wrapper">
                    <i class="fas fa-key-skeleton"></i>
                </div>
                <h1>System Key Recovery</h1>
                <p>Enter your routing email credentials parameter to initialize secure system access restoration tokens.</p>
            </div>

            <!-- Dynamic Feedback Notification Nodes -->
            <div id="status-error" class="feedback-panel feedback-error">
                <i class="fas fa-triangle-exclamation" style="margin-top: 2px;"></i>
                <span id="error-message-text"></span>
            </div>
            
            <div id="status-success" class="feedback-panel feedback-success">
                <i class="fas fa-circle-check" style="margin-top: 2px;"></i>
                <span id="success-message-text"></span>
            </div>

            <!-- Recovery Form Element Structure -->
            <form id="recovery-submission-gate" novalidate>
                <div class="form-group">
                    <label for="recovery-email">Routing Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="recovery-email" class="form-control" placeholder="user@example.com" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <button type="submit" class="btn-submit-action" id="btn-submit-text-trigger">
                    <i class="fas fa-paper-plane"></i> Dispatch Recovery Link
                </button>
            </form>

            <div class="auth-footer-links">
                Remember your parameter keys? <a href="login.html">Login Terminal</a>
            </div>
        </div>

    </main>

    <!-- Base Structural platform Footer Deck -->
    <footer class="auth-minimal-footer">
        <div>&copy; 2026 Nexus Pro Platforms. All structural recovery rights reserved.</div>
    </footer>

    <!-- Frontend Form Handling Script Mechanics -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const recoveryForm = document.getElementById("recovery-submission-gate");
            const emailInput = document.getElementById("recovery-email");
            const btnTrigger = document.getElementById("btn-submit-text-trigger");
            const errPanel = document.getElementById("status-error");
            const errText = document.getElementById("error-message-text");
            const succPanel = document.getElementById("status-success");
            const succText = document.getElementById("success-message-text");

            recoveryForm.addEventListener("submit", async (event) => {
                event.preventDefault();
                
                // Reset state parameters
                errPanel.style.display = "none";
                succPanel.style.display = "none";

                const emailValue = emailInput.value.trim();

                // Validation check parameters
                if (!emailValue) {
                    errText.innerText = "Error: Email parameter space cannot be left blank.";
                    errPanel.style.display = "flex";
                    return;
                }

                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(emailValue)) {
                    errText.innerText = "Error: Please state a structurally valid routing email configuration standard.";
                    errPanel.style.display = "flex";
                    return;
                }

                // Lock down action button and show processing status
                btnTrigger.disabled = true;
                btnTrigger.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Initializing Token...`;

                try {
                    /* 
                       Direct structural hook preparation for backend connection integration.
                       Once your Node / Firebase routes are operational, update here:
                       
                       const response = await fetch('/api/auth/forgot-password', {
                           method: 'POST',
                           headers: { 'Content-Type': 'application/json' },
                           body: JSON.stringify({ email: emailValue })
                       });
                       if (!response.ok) throw new Error('System token failure');
                    */
                    
                    // Simulated network metrics latency
                    await new Promise(resolve => setTimeout(resolve, 1500));

                    // Flash success panel quickly before redirection sequence
                    succText.innerText = "Token generated. Rerouting to notification panel...";
                    succPanel.style.display = "flex";
                    
                    // Route user to the inbox notice landing file
                    setTimeout(() => {
                        window.location.href = "recovery_notice.html";
                    }, 800);
                    
                } catch (networkException) {
                    errText.innerText = "System Exception: Security handshakes timed out. Verify your infrastructure.";
                    errPanel.style.display = "flex";
                    btnTrigger.disabled = false;
                    btnTrigger.innerHTML = `<i class="fas fa-paper-plane"></i> Dispatch Recovery Link`;
                }
            });
        });
    </script>
</body>
                  </html>
