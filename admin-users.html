<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Pro | Control Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .animate-fast-pulse { animation: pulse 0.8s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen antialiased">

    <div id="nexusPreloader" class="fixed inset-0 bg-neutral-950 z-50 flex flex-col justify-center items-center p-6 transition-all duration-300">
        <div class="w-full max-w-5xl space-y-4 animate-fast-pulse">
            <div class="h-8 bg-neutral-900 rounded-xl w-1/4"></div>
            <div class="h-64 bg-neutral-900 rounded-2xl w-full"></div>
        </div>
    </div>

    <div class="flex min-h-screen">
        <aside class="hidden lg:flex flex-col w-64 bg-neutral-900 border-r border-neutral-800/60 p-5 shrink-0">
            <div class="flex items-center gap-3 mb-8 px-2">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-red-600 to-amber-600 flex items-center justify-center font-black shadow-md">A</div>
                <span class="text-lg font-bold tracking-tight">Nexus Admin</span>
            </div>
            <nav class="space-y-1.5 flex-1">
                <a href="admin-dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-neutral-400 hover:text-neutral-200 hover:bg-neutral-800/40 rounded-xl font-medium text-sm transition-all">← Core Console</a>
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 bg-neutral-800 text-red-400 rounded-xl font-medium text-sm transition-all">Manage Students</a>
            </nav>
        </aside>

        <main class="flex-1 min-w-0 flex flex-col">
            <header class="h-16 border-b border-neutral-800/60 flex items-center justify-between px-6 bg-neutral-900/40 backdrop-blur-md sticky top-0 z-30">
                <h2 class="text-lg font-bold tracking-tight text-neutral-200">Student Account Control Deck</h2>
                <div id="userCounter" class="text-xs text-neutral-500 font-medium">Syncing database matrix...</div>
            </header>

            <div class="p-6 space-y-6 flex-1 overflow-y-auto max-w-6xl w-full mx-auto">
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="bg-neutral-900 border border-neutral-800/60 p-4 rounded-xl">
                        <span class="block text-[10px] uppercase font-bold text-neutral-500 tracking-wider">Total Accounts</span>
                        <span class="text-2xl font-black text-neutral-100" id="statTotal">0</span>
                    </div>
                    <div class="bg-neutral-900 border border-neutral-800/60 p-4 rounded-xl">
                        <span class="block text-[10px] uppercase font-bold text-neutral-500 tracking-wider">Active Students</span>
                        <span class="text-2xl font-black text-green-400" id="statActive">0</span>
                    </div>
                    <div class="bg-neutral-900 border border-neutral-800/60 p-4 rounded-xl">
                        <span class="block text-[10px] uppercase font-bold text-neutral-500 tracking-wider">Suspended/Banned</span>
                        <span class="text-2xl font-black text-red-400" id="statBanned">0</span>
                    </div>
                </div>

                <div class="bg-neutral-900 border border-neutral-800/80 rounded-2xl overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-neutral-800 bg-neutral-950/40 text-[11px] font-bold uppercase tracking-wider text-neutral-400">
                                    <th class="p-4">Student Details</th>
                                    <th class="p-4">Assigned Role</th>
                                    <th class="p-4">Account Status</th>
                                    <th class="p-4 text-right">Administrative Flags</th>
                                </tr>
                            </thead>
                            <tbody id="studentTableBody" class="divide-y divide-neutral-800/60 text-sm">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="emailModal" class="fixed inset-0 z-50 bg-neutral-950/80 backdrop-blur-sm flex items-center justify-center p-4 hidden">
        <div class="bg-neutral-900 border border-neutral-800 rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl animate-in fade-in zoom-in-95 duration-150">
            <div class="p-5 border-b border-neutral-800 flex items-center justify-between">
                <h3 class="text-base font-bold text-neutral-200">Compose Student Direct Dispatch</h3>
                <button id="closeEmailModalBtn" class="text-neutral-500 hover:text-neutral-300 text-sm font-bold cursor-pointer">✕</button>
            </div>
            <form id="emailForm" class="p-5 space-y-4">
                <input type="hidden" id="targetStudentId">
                <div>
                    <label class="block text-[11px] font-bold text-neutral-400 uppercase tracking-wide mb-1">Recipient Address</label>
                    <input type="text" id="targetStudentEmail" class="w-full bg-neutral-950 border border-neutral-800 focus:border-neutral-700 rounded-xl px-4 py-2.5 text-xs text-neutral-400 font-semibold outline-none transition-all" readonly>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-neutral-400 uppercase tracking-wide mb-1">Message Subject</label>
                    <input type="text" id="emailSubject" placeholder="e.g., Nexus Portal Notification / System Notice" class="w-full bg-neutral-950 border border-neutral-800 focus:border-blue-900/50 rounded-xl px-4 py-2.5 text-xs text-neutral-200 placeholder-neutral-600 outline-none transition-all" required>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-neutral-400 uppercase tracking-wide mb-1">Message Body</label>
                    <textarea id="emailBody" rows="5" placeholder="Type notification instructions directly to the student here..." class="w-full bg-neutral-950 border border-neutral-800 focus:border-blue-900/50 rounded-xl px-4 py-2.5 text-xs text-neutral-200 placeholder-neutral-600 outline-none transition-all resize-none" required></textarea>
                </div>
                <div class="flex items-center justify-end gap-2 pt-2">
                    <button type="button" id="cancelEmailBtn" class="px-4 py-2 bg-neutral-800 text-neutral-300 hover:text-neutral-100 text-xs font-bold rounded-xl cursor-pointer transition-all">Cancel</button>
                    <button type="submit" id="sendEmailSubmitBtn" class="px-4 py-2 bg-blue-950 text-blue-400 hover:bg-blue-900/60 border border-blue-900/40 text-xs font-bold rounded-xl cursor-pointer transition-all">Dispatch Mail</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="admin-users.js"></script>
</body>
                </html>
