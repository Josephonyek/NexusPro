<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Pro - User Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen font-sans">

    <nav class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <button onclick="window.location.href='dashboard.html'" class="text-gray-400 hover:text-white transition">&larr; Back</button>
            <h1 class="text-xl font-black tracking-wider text-violet-500">NEXUS USER CONTROL</h1>
        </div>
        <span class="px-2.5 py-1 text-xs font-bold uppercase rounded-md bg-violet-950/50 text-violet-400 tracking-wider border border-violet-900/40">
            Admin Auth Active
        </span>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div class="mb-6 flex justify-between items-center">
            <div>
                <h2 class="text-2xl font-extrabold tracking-tight">Active Accounts Database</h2>
                <p class="text-gray-400 text-sm">Modify registration records, suspend access credentials, or contact users.</p>
            </div>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-gray-800 bg-gray-950/50 text-xs font-bold uppercase tracking-wider text-gray-400">
                            <th class="p-4">User Details</th>
                            <th class="p-4">Assigned Role</th>
                            <th class="p-4">Account Status</th>
                            <th class="p-4 text-right">Administrative Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody" class="divide-y divide-gray-800/60">
                        <tr>
                            <td colspan="4" class="p-8 text-center text-gray-500 animate-pulse">Initializing cloud database gateway...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="actionModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-gray-900 border border-gray-800 rounded-2xl w-full max-w-md p-6 shadow-2xl">
            <h3 id="modalTitle" class="text-xl font-bold mb-2 text-violet-400">Modal Header</h3>
            <p id="modalSubtitle" class="text-xs text-gray-400 mb-4"></p>
            
            <div id="modalContentSlot"></div>

            <div class="flex justify-end gap-3 mt-6">
                <button onclick="closeModal()" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-sm font-semibold rounded-xl transition">Cancel</button>
                <button id="modalSubmitBtn" class="px-4 py-2 bg-violet-600 hover:bg-violet-700 text-sm font-semibold rounded-xl text-white transition">Apply Changes</button>
            </div>
        </div>
    </div>

    <script>
        let db;
        let currentActiveTargetUid = '';

        // Dynamic Configuration Load Handler
        async function initializeAdminDashboard() {
            try {
                // Fetch credentials securely from your internal endpoint
                const configResponse = await fetch('/api/firebaseConfig');
                const firebaseConfig = await configResponse.json();

                // Boot Firebase
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                db = firebase.database();

                // Start listening to the DB streams
                listenToUsers();
            } catch (error) {
                console.error(error);
                document.getElementById('userTableBody').innerHTML = 
                    `<tr><td colspan="4" class="p-8 text-center text-red-400">Failed to securely load cloud environment credentials.</td></tr>`;
            }
        }

        function listenToUsers() {
            const usersRef = db.ref('users');
            
            usersRef.on('value', snapshot => {
                const tableBody = document.getElementById('userTableBody');
                tableBody.innerHTML = '';
                
                if (!snapshot.exists()) {
                    tableBody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-gray-500">No active user node entries found.</td></tr>';
                    return;
                }

                snapshot.forEach(childSnapshot => {
                    const uid = childSnapshot.key;
                    const userData = childSnapshot.val();

                    const name = userData.name || 'Anonymous User';
                    const email = userData.email || 'No Linked Email';
                    const role = userData.role || 'user';
                    const isSuspended = userData.status === 'suspended';

                    const row = document.createElement('tr');
                    row.className = "hover:bg-gray-950/30 transition duration-150";

                    row.innerHTML = `
                        <td class="p-4">
                            <div class="font-bold text-sm">${name}</div>
                            <div class="text-xs text-gray-400 mt-0.5">${email}</div>
                        </td>
                        <td class="p-4">
                            <span class="px-2 py-0.5 text-xs font-semibold rounded ${role === 'admin' ? 'bg-red-950 text-red-400 border border-red-900/30' : 'bg-blue-950 text-blue-400 border border-blue-900/30'}">
                                ${role}
                            </span>
                        </td>
                        <td class="p-4">
                            <span class="flex items-center gap-1.5 text-xs ${isSuspended ? 'text-red-400' : 'text-green-400'}">
                                <span class="w-2 h-2 rounded-full ${isSuspended ? 'bg-red-500' : 'bg-green-500'}"></span>
                                ${isSuspended ? 'Suspended' : 'Active'}
                            </span>
                        </td>
                        <td class="p-4 text-right space-x-1.5">
                            <button onclick="openEmailModal('${uid}', '${email}')" class="px-2.5 py-1.5 bg-gray-800 hover:bg-gray-700 text-xs rounded-lg font-medium transition">✉️ Email</button>
                            <button onclick="openEditModal('${uid}', '${name}', '${role}')" class="px-2.5 py-1.5 bg-gray-800 hover:bg-gray-700 text-xs rounded-lg font-medium text-blue-400 transition">✏️ Edit</button>
                            <button onclick="toggleSuspend('${uid}', ${isSuspended})" class="px-2.5 py-1.5 bg-gray-800 hover:bg-gray-700 text-xs rounded-lg font-medium ${isSuspended ? 'text-green-400' : 'text-yellow-500'} transition">
                                ${isSuspended ? '🔓 Unsuspend' : '🚫 Suspend'}
                            </button>
                            <button onclick="deleteUser('${uid}', '${name}')" class="px-2.5 py-1.5 bg-red-950/40 hover:bg-red-900/40 text-xs rounded-lg font-medium text-red-400 border border-red-900/30 transition">🗑️ Delete</button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            });
        }

        function openEditModal(uid, name, role) {
            currentActiveTargetUid = uid;
            document.getElementById('modalTitle').innerText = "Edit User Attributes";
            document.getElementById('modalSubtitle').innerText = `Editing UID: ${uid}`;
            
            document.getElementById('modalContentSlot').innerHTML = `
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 font-bold uppercase">Display Name</label>
                        <input type="text" id="editNameField" value="${name}" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-2.5 text-sm outline-none focus:border-violet-500 text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 font-bold uppercase">Access Level Authority</label>
                        <select id="editRoleField" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-2.5 text-sm outline-none focus:border-violet-500 text-white">
                            <option value="user" ${role === 'user' ? 'selected' : ''}>User</option>
                            <option value="admin" ${role === 'admin' ? 'selected' : ''}>Admin</option>
                        </select>
                    </div>
                </div>
            `;
            
            document.getElementById('modalSubmitBtn').onclick = saveEditData;
            document.getElementById('actionModal').classList.remove('hidden');
        }

        function saveEditData() {
            const newName = document.getElementById('editNameField').value;
            const newRole = document.getElementById('editRoleField').value;

            db.ref(`users/${currentActiveTargetUid}`).update({
                name: newName,
                role: newRole
            }).then(() => closeModal()).catch(err => alert(err.message));
        }

        function toggleSuspend(uid, currentlySuspended) {
            const targetStatusUpdate = currentlySuspended ? 'active' : 'suspended';
            if (confirm(`Change status to ${targetStatusUpdate}?`)) {
                db.ref(`users/${uid}`).update({ status: targetStatusUpdate }).catch(err => alert(err.message));
            }
        }

        document.getElementById('modalSubmitBtn').onclick = saveEditData;

        function deleteUser(uid, name) {
            if (confirm(`Are you sure you want to delete ${name}?`)) {
                db.ref(`users/${uid}`).remove().catch(err => alert(err.message));
            }
        }

        function openEmailModal(uid, email) {
            currentActiveTargetUid = uid;
            document.getElementById('modalTitle').innerText = "Compose Account Notification";
            document.getElementById('modalSubtitle').innerText = `To: ${email}`;
            
            document.getElementById('modalContentSlot').innerHTML = `
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 font-bold uppercase">Subject Line</label>
                        <input type="text" id="emailSubject" value="Nexus Pro Account Update" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-2.5 text-sm outline-none focus:border-violet-500 text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 font-bold uppercase">Message Body</label>
                        <textarea id="emailBody" rows="4" placeholder="Type message parameters here..." class="w-full bg-gray-950 border border-gray-800 rounded-xl p-2.5 text-sm outline-none focus:border-violet-500 text-white"></textarea>
                    </div>
                </div>
            `;
            
            document.getElementById('modalSubmitBtn').onclick = () => {
                const subject = document.getElementById('emailSubject').value;
                const body = document.getElementById('emailBody').value;
                window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                closeModal();
            };
            
            document.getElementById('actionModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('actionModal').classList.add('hidden');
        }

        // Initialize immediately on document mount
        initializeAdminDashboard();
    </script>
</body>
              </html>
