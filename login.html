<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- PRIMARY SEARCH ENGINE OPTIMIZATION (SEO) META MATRIX -->
    <title>Nexus Pro | Sign In to Your Academic Workspace</title>
    <meta name="description" content="Secure login portal for Nexus Pro. Access your curriculum notes, customized video modules, and academic performance suites instantly.">
    <meta name="robots" content="index, nofollow">
    <link rel="canonical" href="https://nexuspro.vercel.app/login.html">

    <!-- TAILWIND PLAY CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- COMPREHENSIVE STYLE SYSTEM -->
    <style>
        /* Smooth backdrop blur animation and glow patterns */
        .glass-card {
            background: rgba(15, 15, 15, 0.4) !important;
            backdrop-filter: blur(24px) !important;
            -webkit-backdrop-filter: blur(24px) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
        }

        /* Floating background orbs */
        .glow-orb-blue {
            filter: blur(100px);
            background: radial-gradient(circle, #2563eb 0%, transparent 70%);
            animation: float-blue 12s infinite alternate ease-in-out;
        }

        .glow-orb-purple {
            filter: blur(120px);
            background: radial-gradient(circle, #4f46e5 0%, transparent 70%);
            animation: float-purple 16s infinite alternate ease-in-out;
        }

        @keyframes float-blue {
            0% { transform: translate(0px, 0px) scale(1); }
            100% { transform: translate(80px, 40px) scale(1.2); }
        }

        @keyframes float-purple {
            0% { transform: translate(0px, 0px) scale(1); }
            100% { transform: translate(-80px, -50px) scale(1.1); }
        }

        /* Bulletproof fallback layout wrapper for the password field */
        .password-row-wrapper {
            display: flex !important;
            gap: 10px !important;
            width: 100% !important;
            align-items: center !important;
        }

        .password-input-field {
            flex-grow: 1 !important;
            min-width: 0 !important;
        }

        .modern-toggle-btn {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            background-color: rgba(255, 255, 255, 0.04) !important;
            color: #e5e5e5 !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 12px !important;
            padding: 0 16px !important;
            font-size: 11px !important;
            font-weight: 800 !important;
            text-transform: uppercase !important;
            letter-spacing: 0.05em !important;
            cursor: pointer !important;
            white-space: nowrap !important;
            height: 46px !important; /* Perfect align match to the main fields */
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .modern-toggle-btn:hover {
            background-color: rgba(255, 255, 255, 0.1) !important;
            border-color: rgba(255, 255, 255, 0.2) !important;
            color: #ffffff !important;
            transform: translateY(-1px);
        }

        .modern-toggle-btn:active {
            transform: translateY(0px);
        }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-200 min-h-screen flex flex-col justify-between antialiased selection:bg-indigo-950 selection:text-indigo-400 overflow-x-hidden relative">

    <!-- FLOATING DECORATIVE BACKGROUND SYSTEM -->
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] glow-orb-blue pointer-events-none z-0"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] glow-orb-purple pointer-events-none z-0"></div>

    <!-- TOP DECK: BRAND HEADER -->
    <header class="w-full h-20 px-8 flex items-center relative z-10">
        <a href="index.html" class="flex items-center gap-3 hover:opacity-90 transition-opacity">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-blue-600 via-indigo-600 to-indigo-700 flex items-center justify-center font-black shadow-[0_0_20px_rgba(37,99,235,0.3)] text-white" aria-hidden="true">N</div>
            <span class="text-xl font-extrabold tracking-tight text-neutral-100">Nexus<span class="text-indigo-400">Pro</span></span>
        </a>
    </header>

    <!-- MAIN CORE PANEL -->
    <main class="flex-grow flex items-center justify-center px-4 py-8 relative z-10">
        <div class="w-full max-w-[440px] glass-card rounded-[32px] p-8 md:p-10 space-y-8 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
            
            <!-- HEADER INFO block -->
            <div class="space-y-2 text-center">
                <div class="inline-block px-3 py-1 bg-indigo-500/10 border border-indigo-500/20 text-[10px] text-indigo-300 font-extrabold tracking-widest uppercase rounded-full">
                    Academic Command Console
                </div>
                <h1 id="formTitle" class="text-3xl font-black tracking-tight text-white pt-2">Welcome Back</h1>
                <p id="formSubtitle" class="text-xs text-neutral-400 font-medium">Enter your credentials to access your course files</p>
            </div>

            <!-- AUTH ALERT HUB -->
            <div id="authAlert" class="hidden px-4 py-3.5 bg-red-950/40 border border-red-900/30 rounded-xl text-xs text-red-400 font-medium leading-relaxed"></div>

            <!-- INTERACTIVE LOGIN FORM -->
            <form id="authForm" class="space-y-5" novalidate>
                
                <!-- ACCOUNT FULL NAME (Only displays in dynamic Sign Up state) -->
                <div id="fullNameGroup" class="hidden space-y-2">
                    <label for="fullName" class="block text-[11px] font-extrabold uppercase tracking-widest text-neutral-400">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="John Doe" 
                           class="w-full bg-neutral-900/60 border border-neutral-800/80 focus:border-indigo-500/80 focus:ring-1 focus:ring-indigo-500/50 rounded-xl px-4 py-3.5 text-xs text-neutral-100 outline-none transition-all placeholder:text-neutral-600">
                </div>

                <!-- EMAIL ADDR INPUT -->
                <div class="space-y-2">
                    <label for="email" class="block text-[11px] font-extrabold uppercase tracking-widest text-neutral-400">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@domain.com" required
                           class="w-full bg-neutral-900/60 border border-neutral-800/80 focus:border-indigo-500/80 focus:ring-1 focus:ring-indigo-500/50 rounded-xl px-4 py-3.5 text-xs text-neutral-100 outline-none transition-all placeholder:text-neutral-600">
                </div>

                <!-- EXTERNAL PASSWORD FIELD ROW -->
                <div class="space-y-2">
                    <label for="password" class="block text-[11px] font-extrabold uppercase tracking-widest text-neutral-400">Security Password</label>
                    <div class="password-row-wrapper">
                        <!-- Password input block -->
                        <input type="password" id="password" name="password" placeholder="••••••••" required
                               class="password-input-field bg-neutral-900/60 border border-neutral-800/80 focus:border-indigo-500/80 focus:ring-1 focus:ring-indigo-500/50 rounded-xl px-4 py-3.5 text-xs text-neutral-100 outline-none transition-all placeholder:text-neutral-600">
                        
                        <!-- Fixed External Toggle Button -->
                        <button type="button" id="togglePasswordBtn" class="modern-toggle-btn" aria-label="Show password">
                            <span id="toggleText" style="margin-right: 4px;">Show</span>
                            <span id="toggleEmoji">👁️</span>
                        </button>
                    </div>
                </div>

                <!-- FORWARD SUBMIT TRIGGER -->
                <button type="submit" id="submitBtn" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white text-xs font-extrabold uppercase tracking-wider rounded-xl shadow-lg shadow-indigo-950/40 hover:shadow-indigo-900/50 hover:scale-[1.01] active:scale-[0.99] transition-all cursor-pointer">
                    Authenticate Workspace
                </button>
            </form>

            <!-- FOOTER SWITCH TOGGLE SYSTEM -->
            <div class="text-center pt-2 space-y-2">
                <span id="routeText" class="text-xs text-neutral-500 font-medium block">Need an academic student account?</span>
                <button type="button" id="toggleRouteBtn" class="text-xs text-indigo-400 hover:text-indigo-300 font-bold hover:underline transition-all cursor-pointer">
                    Create your Free Student Profile
                </button>
            </div>

        </div>
    </main>

    <!-- FOOTER SECTION -->
    <footer class="w-full py-8 text-center relative z-10">
        <p class="text-[10px] text-neutral-600 font-medium tracking-wide">&copy; 2026 Nexus Pro Academy. All Systems Operational.</p>
    </footer>

    <!-- INTERACTIVE SCRIPTS -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const passwordField = document.getElementById("password");
            const toggleBtn = document.getElementById("togglePasswordBtn");
            const toggleText = document.getElementById("toggleText");
            const toggleEmoji = document.getElementById("toggleEmoji");

            // Password field character peek function
            toggleBtn.addEventListener("click", () => {
                const isPassword = passwordField.type === "password";
                passwordField.type = isPassword ? "text" : "password";
                
                if (isPassword) {
                    toggleText.innerText = "Hide";
                    toggleEmoji.innerText = "🙈";
                    toggleBtn.setAttribute("aria-label", "Hide password");
                } else {
                    toggleText.innerText = "Show";
                    toggleEmoji.innerText = "👁️";
                    toggleBtn.setAttribute("aria-label", "Show password");
                }
            });

            // Route switching utility (Sign In vs Register views)
            const toggleRouteBtn = document.getElementById("toggleRouteBtn");
            const formTitle = document.getElementById("formTitle");
            const formSubtitle = document.getElementById("formSubtitle");
            const fullNameGroup = document.getElementById("fullNameGroup");
            const submitBtn = document.getElementById("submitBtn");
            const routeText = document.getElementById("routeText");
            let isRegisterMode = false;

            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('action') === 'register') {
                toggleMode(true);
            }

            toggleRouteBtn.addEventListener("click", () => {
                isRegisterMode = !isRegisterMode;
                toggleMode(isRegisterMode);
            });

            function toggleMode(registerState) {
                isRegisterMode = registerState;
                if (isRegisterMode) {
                    formTitle.innerText = "Register Account";
                    formSubtitle.innerText = "Initialize your master student file to begin online classes";
                    fullNameGroup.classList.remove("hidden");
                    submitBtn.innerText = "Create Free Account";
                    routeText.innerText = "Already possess an active profile?";
                    toggleRouteBtn.innerText = "Sign In to Workspace";
                } else {
                    formTitle.innerText = "Welcome Back";
                    formSubtitle.innerText = "Enter your credentials to access your course files";
                    fullNameGroup.classList.add("hidden");
                    submitBtn.innerText = "Authenticate Workspace";
                    routeText.innerText = "Need an academic student account?";
                    toggleRouteBtn.innerText = "Create your Free Student Profile";
                }
            }
        });
    </script>
</body>
</html>
