<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Pro | Secure Sign In</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen flex items-center justify-center p-4 antialiased selection:bg-blue-600/30 selection:text-blue-400">

    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-indigo-600/10 rounded-full blur-[128px]"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-blue-600/5 rounded-full blur-[160px]"></div>
    </div>

    <div class="w-full max-w-md bg-neutral-900/60 border border-neutral-800/80 rounded-2xl p-8 shadow-2xl relative z-10 backdrop-blur-xl">
        
        <div class="mb-8 text-center">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-600 mb-4 shadow-lg shadow-blue-600/20">
                <span class="text-xl font-black text-white tracking-tighter">N</span>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-neutral-50 via-neutral-200 to-neutral-400 bg-clip-text text-transparent">
                Welcome Back
            </h1>
            <p class="text-neutral-400 text-sm mt-1.5">Sign in to resume access authorizations</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-neutral-400 uppercase tracking-wider mb-2">Email Address</label>
                <div class="relative">
                    <input type="email" id="loginEmail" required placeholder="you@example.com" 
                        class="w-full bg-neutral-950/80 border border-neutral-800/80 focus:border-blue-500/80 rounded-xl px-4 py-3.5 text-neutral-200 placeholder-neutral-600 outline-none transition-all duration-200 text-sm focus:ring-4 focus:ring-blue-500/10">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-neutral-400 uppercase tracking-wider mb-2">Password</label>
                <div class="relative">
                    <input type="password" id="loginPassword" required placeholder="••••••••" 
                        class="w-full bg-neutral-950/80 border border-neutral-800/80 focus:border-blue-500/80 rounded-xl px-4 py-3.5 text-neutral-200 placeholder-neutral-600 outline-none transition-all duration-200 text-sm focus:ring-4 focus:ring-blue-500/10">
                </div>
            </div>

            <button type="submit" 
                class="w-full relative group bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-semibold py-3.5 rounded-xl transition-all duration-200 text-sm tracking-wide shadow-xl shadow-blue-600/10 active:scale-[0.98] disabled:opacity-40 disabled:pointer-events-none cursor-pointer">
                <span class="relative z-10">Sign In to Dashboard</span>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-neutral-800/60 text-center text-sm">
            <span class="text-neutral-500">New to the platform?</span>
            <a href="signup.html" class="text-blue-400 hover:text-blue-300 ml-1 font-semibold transition-colors">Create Account</a>
        </div>
    </div>

    <script src="login.js"></script>
</body>
            </html>
