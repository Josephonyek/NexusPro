<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Pro - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth fade-in animation for mobile screens */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-950 text-white flex items-center justify-center min-h-screen font-sans">

    <div class="w-full max-w-md mx-4 bg-gray-900 border border-gray-800 rounded-2xl p-6 sm:p-8 shadow-2xl animate-fade-in">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-wider bg-gradient-to-r from-blue-500 to-indigo-400 bg-clip-text text-transparent">
                NEXUS PRO
            </h1>
            <p class="text-gray-400 text-sm mt-1">Advanced Student & Sports Hub</p>
        </div>

        <div id="statusBanner" class="hidden mb-4 p-3 rounded-lg text-sm font-medium text-center transition-all duration-300">
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1.5">
                    Email Address
                </label>
                <input type="email" id="email" required autocomplete="email"
                    class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    placeholder="student@nexuspro.com">
            </div>

            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-gray-400">
                        Password
                    </label>
                    <a href="#" class="text-xs text-blue-400 hover:underline">Forgot?</a>
                </div>
                <input type="password" id="password" required autocomplete="current-password"
                    class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    placeholder="••••••••">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 active:scale-[0.98] text-white font-bold rounded-xl shadow-lg shadow-blue-600/20 transition duration-150 flex items-center justify-center space-x-2">
                <span>Sign In to Portal</span>
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-400">
            Don't have an account? 
            <a href="signup.html" class="text-blue-400 font-medium hover:underline ml-1">Create one</a>
        </div>

    </div>

    <script src="login.js"></script>
</body>
</html>
