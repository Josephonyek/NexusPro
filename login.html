
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- PRIMARY SEARCH ENGINE OPTIMIZATION (SEO) META MATRIX -->
    <title>Nexus Pro | Sign In to Your Academic Workspace</title>
    <meta name="description" content="Secure login portal for Nexus Pro. Access your curriculum notes, customized video modules, and academic performance suites instantly.">
    <meta name="robots" content="index, nofollow">
    <link rel="canonical" href="https://nexuspro.vercel.app/login.html">

    <!-- CSS ARCHITECTURE -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .glow-box {
            position: relative;
        }
        .glow-box::after {
            content: '';
            position: absolute;
            inset: -1px;
            background: linear-gradient(135deg, #3b82f620, transparent, #3b82f610);
            border-radius: 24px;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen flex flex-col justify-between antialiased selection:bg-blue-950 selection:text-blue-400">

    <!-- TOP DECK: MINI BRAND HEADER -->
    <header class="w-full h-16 px-6 flex items-center">
        <a href="index.html" class="flex items-center gap-3 hover:opacity-90 transition-opacity">
            <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center font-black shadow-lg text-white" aria-hidden="true">N</div>
            <span class="text-lg font-extrabold tracking-tight text-neutral-100">Nexus<span class="text-blue-500">Pro</span></span>
        </a>
    </header>

    <!-- CORE CARD MODULE -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md bg-neutral-900/30 border border-neutral-900 glow-box rounded-3xl p-8 space-y-6 backdrop-blur-md">
            
            <!-- HEADER -->
            <div class="space-y-2 text-center">
                <h1 id="formTitle" class="text-2xl font-black tracking-tight text-neutral-100">Welcome Back</h1>
                <p id="formSubtitle" class="text-xs text-neutral-400 font-medium">Enter your administrative credentials to sync workspace metrics</p>
            </div>

            <!-- DYNAMIC ALERT CONTAINER -->
            <div id="authAlert" class="hidden px-4 py-3 bg-red-950/40 border border-red-900/40 rounded-xl text-xs text-red-400 font-semibold leading-relaxed"></div>

            <!-- AUTHENTICATION FORM WRAPPER -->
            <form id="authForm" class="space-y-4" novalidate>
                <!-- FULL NAME (Only shown on signup action, hidden by default) -->
                <div id="fullNameGroup" class="hidden space-y-1.5">
                    <label for="fullName" class="block text-xs font-bold uppercase tracking-wider text-neutral-400">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="John Doe" 
                           class="w-full bg-neutral-950 border border-neutral-800 focus:border-blue-500 rounded-xl px-4 py-3 text-xs text-neutral-100 outline-none transition-all placeholder:text-neutral-600">
                </div>

                <!-- EMAIL FIELD -->
                <div class="space-y-1.5">
                    <label for="email" class="block text-xs font-bold uppercase tracking-wider text-neutral-400">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@domain.com" required
                           class="w-full bg-neutral-950 border border-neutral-800 focus:border-blue-500 rounded-xl px-4 py-3 text-xs text-neutral-100 outline-none transition-all placeholder:text-neutral-600">
                </div>

                <!-- PASSWORD FIELD WITH INTERACTIVE VISIBILITY TOGGLE -->
                <div class="space-y-1.5">
                    <label for="password" class="block text-xs font-bold uppercase tracking-wider text-neutral-400">Security Password</label>
                    <div class="relative w-full">
                        <input type="password" id="password" name="password" placeholder="••••••••" required
                               class="w-full bg-neutral-950 border border-neutral-800 focus:border-blue-500 rounded-xl pl-4 pr-12 py-3 text-xs text-neutral-100 outline-none transition-all placeholder:text-neutral-600">
                        
                        <!-- Toggle Password Visibility Button -->
                        <button type="button" id="togglePasswordBtn" aria-label="Show password"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-neutral-400 hover:text-neutral-200 transition-colors focus:outline-none p-1.5 cursor-pointer z-10">
                            
                            <!-- Eye Open SVG (Shows when password is hidden) -->
                            <svg id="eyeOpenIcon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>

                            <!-- Eye Closed/Slash SVG (Shows when password is visible) -->
                            <svg id="eyeClosedIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.822 7.822L21 21m-2.228-2.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- FORM BUTTON CONTROLLER -->
                <button type="submit" id="submitBtn" class="w-full py-3.5 bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold rounded-xl shadow-lg shadow-blue-900/20 transition-all cursor-pointer">
                    Authenticate Workspace
                </button>
            </form>

            <!-- FOOTER SWITCH ROUTE LINK -->
            <div class="text-center pt-2">
                <span id="routeText" class="text-xs text-neutral-500 font-semibold">Need a secure, role-based student account?</span>
                <button type="button" id="toggleRouteBtn" class="block mx-auto mt-1 text-xs text-blue-400 hover:text-blue-300 font-bold hover:underline transition-all cursor-pointer">
                    Create your Free Student Profile
                </button>
            </div>

        </div>
    </main>

    <!-- FOOTER LICENSE SHELL -->
    <footer class="w-full py-6 text-center">
        <p class="text-[10px] text-neutral-600 font-medium">&copy; 2026 Nexus Pro Academy. Built Securely. All Rights Reserved.</p>
    </footer>

    <!-- TOGGLE LOGIC SCRIPT -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const passwordField = document.getElementById("password");
            const toggleBtn = document.getElementById("togglePasswordBtn");
            const eyeOpenIcon = document.getElementById("eyeOpenIcon");
            const eyeClosedIcon = document.getElementById("eyeClosedIcon");

            // Toggle function swapping visual elements
            toggleBtn.addEventListener("click", () => {
                const isPassword = passwordField.type === "password";
                
                // Toggle input type
                passwordField.type = isPassword ? "text" : "password";
                
                // Swap visibility of the SVG elements directly
                if (isPassword) {
                    eyeOpenIcon.classList.add("hidden");
                    eyeClosedIcon.classList.remove("hidden");
                    toggleBtn.setAttribute("aria-label", "Hide password");
                } else {
                    eyeOpenIcon.classList.remove("hidden");
                    eyeClosedIcon.classList.add("hidden");
                    toggleBtn.setAttribute("aria-label", "Show password");
                }
            });

            // Demo Route Toggle (Login <-> Register switch mechanism)
            const toggleRouteBtn = document.getElementById("toggleRouteBtn");
            const formTitle = document.getElementById("formTitle");
            const formSubtitle = document.getElementById("formSubtitle");
            const fullNameGroup = document.getElementById("fullNameGroup");
            const submitBtn = document.getElementById("submitBtn");
            const routeText = document.getElementById("routeText");
            let isRegisterMode = false;

            // Simple URL checking for action parameters
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('action') === 'register') {
                toggleMode(true);
            }

            toggleRouteBtn.addEventListener("click", () => {
                isRegisterMode = !isRegisterMode;
                toggleMode(isRegisterMode);
            });

            function toggleMode(registerState) {
                isRegisterMode = registerState;
                if (isRegisterMode) {
                    formTitle.innerText = "Register Account";
                    formSubtitle.innerText = "Initialize your master student file to begin online classes";
                    fullNameGroup.classList.remove("hidden");
                    submitBtn.innerText = "Create Free Account";
                    routeText.innerText = "Already possess an active profile?";
                    toggleRouteBtn.innerText = "Sign In to Workspace";
                } else {
                    formTitle.innerText = "Welcome Back";
                    formSubtitle.innerText = "Enter your credentials to sync workspace metrics";
                    fullNameGroup.classList.add("hidden");
                    submitBtn.innerText = "Authenticate Workspace";
                    routeText.innerText = "Need a secure, role-based student account?";
                    toggleRouteBtn.innerText = "Create your Free Student Profile";
                }
            }
        });
    </script>
</body>
    </html>
