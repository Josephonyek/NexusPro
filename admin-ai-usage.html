<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Usage Monitor - Nexus Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white">

    <nav class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='dashboard.html'" class="text-2xl">←</button>
            <h1 class="text-xl font-bold">AI Usage Monitor</h1>
        </div>
        <button onclick="loadUsageData()" class="px-4 py-2 bg-blue-600 rounded-xl text-sm">Refresh</button>
    </nav>

    <div class="max-w-6xl mx-auto p-6">
        <div class="mb-6">
            <h2 class="text-2xl font-bold">AI Usage Reports</h2>
            <p class="text-gray-400">Track how users are interacting with the AI Solver</p>
        </div>

        <div id="usageContainer" class="space-y-6">
            <!-- Data will be loaded here by JavaScript -->
        </div>
    </div>

    <script src="admin-ai-usage.js"></script>
</body>
</html>
