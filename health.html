<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verified Health & News Center</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --health-accent: #06b6d4;
            --border: #1f2937;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { margin: 0 0 10px 0; font-size: 2rem; color: var(--health-accent); }
        .subtitle { color: var(--text-muted); margin: 0; }

        .search-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .search-sections { grid-template-columns: 1fr; }
        }

        .panel-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel-box h2 { font-size: 1.1rem; margin: 0 0 5px 0; color: var(--health-accent); }
        .input-row { display: flex; gap: 10px; align-items: center; }

        select, input {
            background-color: #1f2937;
            color: white;
            border: 1px solid var(--border);
            padding: 11px;
            border-radius: 6px;
            flex: 1;
            outline: none;
            font-size: 0.95rem;
        }

        button {
            background-color: var(--health-accent);
            color: #000;
            border: none;
            padding: 11px 18px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        .column-title {
            font-size: 1.3rem;
            color: var(--text-main);
            border-bottom: 2px solid var(--border);
            padding-bottom: 8px;
            margin-top: 0;
        }

        /* Advice Cards */
        .advice-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid var(--health-accent);
        }
        .advice-heading { font-size: 1.15rem; font-weight: 600; margin: 0 0 8px 0; }
        .advice-text { color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; margin: 0; }
        .advice-link { display: inline-block; margin-top: 12px; color: var(--health-accent); text-decoration: none; font-size: 0.9rem; }

        /* GNews Layout Interface Elements */
        .news-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        .news-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #1f2937;
        }
        .news-body { padding: 15px; }
        .news-source { font-size: 0.75rem; color: var(--health-accent); font-weight: bold; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .news-title { font-size: 1.1rem; font-weight: 600; margin: 0 0 8px 0; color: #fff; text-decoration: none; display: block; }
        .news-title:hover { color: var(--health-accent); }
        .news-text { color: var(--text-muted); font-size: 0.9rem; line-height: 1.4; margin: 0; }

        .loading { text-align: center; color: var(--text-muted); padding: 40px; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Verified Health & News Center</h1>
            <p class="subtitle">Global health journalism and clinical advisories unified in one view</p>
        </header>

        <div class="search-sections">
            <div class="panel-box">
                <h2>1. Daily Checkups Check</h2>
                <div class="input-row">
                    <input type="number" id="user-age" value="25" min="1" max="120">
                    <select id="user-sex">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <button onclick="getRecommendations()">Get Recommendations</button>
            </div>

            <div class="panel-box">
                <h2>2. Search Health Conditions</h2>
                <div class="input-row">
                    <input type="text" id="search-keyword" placeholder="e.g., Diabetes, Asthma, Allergy">
                </div>
                <button onclick="searchConditions()">Search Directory</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div>
                <h3 class="column-title">Medical Advisories</h3>
                <div id="advice-container">
                    <div class="loading">Select metric updates above to drop clinical guidelines...</div>
                </div>
            </div>

            <div>
                <h3 class="column-title">Top Health Headlines</h3>
                <div id="news-container">
                    <div class="loading">Connecting to verified health news wire...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const adviceContainer = document.getElementById('advice-container');
        const newsContainer = document.getElementById('news-container');

        function renderAdvice(topics) {
            if (!topics || topics.length === 0) {
                adviceContainer.innerHTML = '<div class="loading">No matching entries found. Try terms like "Diabetes".</div>';
                return;
            }
            adviceContainer.innerHTML = '';
            topics.forEach(item => {
                adviceContainer.innerHTML += `
                    <div class="advice-card">
                        <h4 class="advice-heading">${item.Title || 'Guideline Update'}</h4>
                        <p class="advice-text">${item.Notes || item.Teaser || 'Click below to review official rules.'}</p>
                        <a class="advice-link" href="${item.AccessibleVersion || '#'}" target="_blank">Read Guide &rarr;</a>
                    </div>
                `;
            });
        }

        async function getRecommendations() {
            const age = document.getElementById('user-age').value;
            const sex = document.getElementById('user-sex').value;
            adviceContainer.innerHTML = '<div class="loading">Compiling clinical guidelines...</div>';
            try {
                const res = await fetch(`/api/healthAdvice?type=recommendations&age=${age}&sex=${sex}`);
                const data = await res.json();
                renderAdvice(data.Result?.MyHealthFinder?.ResultObjects?.ResultObject || []);
            } catch {
                adviceContainer.innerHTML = '<div class="loading">Error loading lists.</div>';
            }
        }

        async function searchConditions() {
            const keyword = document.getElementById('search-keyword').value.trim();
            if(!keyword) return alert('Enter a topic word.');
            adviceContainer.innerHTML = '<div class="loading">Searching...</div>';
            try {
                const res = await fetch(`/api/healthAdvice?type=search&keyword=${keyword}`);
                const data = await res.json();
                let topics = data.Result?.Topics?.Topic || data.Result?.MyHealthFinder?.ResultObjects?.ResultObject || [];
                if (!Array.isArray(topics)) topics = [topics];
                renderAdvice(topics);
            } catch {
                adviceContainer.innerHTML = '<div class="loading">Search query connection dropped.</div>';
            }
        }

        // Fetch Verified GNews Records
        async function fetchHealthNews() {
            try {
                const res = await fetch('/api/healthAdvice?type=news');
                const data = await res.json();
                const articles = data.articles || [];

                if (articles.length === 0) {
                    newsContainer.innerHTML = '<div class="loading">No news found. Ensure your GNEWS_API_KEY is configured on Vercel.</div>';
                    return;
                }

                newsContainer.innerHTML = '';
                articles.forEach(article => {
                    const fallbackImg = 'https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=500&q=80';
                    const imageSrc = article.image || fallbackImg;
                    const publisher = article.source?.name || 'Verified Publisher';

                    newsContainer.innerHTML += `
                        <div class="news-card">
                            <img class="news-img" src="${imageSrc}" alt="" onerror="this.src='${fallbackImg}'">
                            <div class="news-body">
                                <span class="news-source">${publisher}</span>
                                <a class="news-title" href="${article.url}" target="_blank">${article.title}</a>
                                <p class="news-text">${article.description || ''}</p>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                newsContainer.innerHTML = '<div class="loading">Failed to stream live news feeds.</div>';
            }
        }

        // Initialize News layout execution on load
        fetchHealthNews();
    </script>
</body>
</html>
