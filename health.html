<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verified Health Advisor Hub</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --health-accent: #06b6d4;
            --border: #1f2937;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 850px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { margin: 0 0 10px 0; font-size: 2rem; color: var(--health-accent); }
        .subtitle { color: var(--text-muted); margin: 0; }

        .search-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .search-sections { grid-template-columns: 1fr; }
        }

        .panel-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel-box h2 { font-size: 1.1rem; margin: 0 0 5px 0; color: var(--health-accent); }
        .input-row { display: flex; gap: 10px; align-items: center; }

        select, input {
            background-color: #1f2937;
            color: white;
            border: 1px solid var(--border);
            padding: 11px;
            border-radius: 6px;
            flex: 1;
            outline: none;
            font-size: 0.95rem;
        }

        button {
            background-color: var(--health-accent);
            color: #000;
            border: none;
            padding: 11px 18px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
        }
        button:hover { opacity: 0.9; }

        .advice-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            padding: 22px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid var(--health-accent);
        }

        .advice-heading { font-size: 1.2rem; font-weight: 600; margin-top: 0; margin-bottom: 8px; }
        .advice-text { color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; margin: 0; }
        .advice-link { display: inline-block; margin-top: 12px; color: var(--health-accent); text-decoration: none; font-size: 0.9rem; font-weight: 500; }
        
        .loading { text-align: center; color: var(--text-muted); padding: 40px; font-style: italic; }
        .source-badge { font-size: 0.8rem; color: var(--text-muted); text-align: center; margin-top: 50px; display: block;}
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Verified Health Advisor</h1>
            <p class="subtitle">Evidence-based guidelines and condition updates from certified agencies</p>
        </header>

        <div class="search-sections">
            <div class="panel-box">
                <h2>1. Daily Checkups Check</h2>
                <div class="input-row">
                    <input type="number" id="user-age" value="25" min="1" max="120" placeholder="Age">
                    <select id="user-sex">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <button onclick="getRecommendations()">Get Recommendations</button>
            </div>

            <div class="panel-box">
                <h2>2. Search Health Conditions</h2>
                <div class="input-row">
                    <input type="text" id="search-keyword" placeholder="e.g., Diabetes, Heart, Vaccine">
                </div>
                <button onclick="searchConditions()">Search Directory</button>
            </div>
        </div>

        <div id="health-results">
            <div class="loading">Enter metrics or search conditions above to populate medical advisories.</div>
        </div>
        
        <span class="source-badge">Official Data Stream: ODPHP MyHealthfinder Resource Library</span>
    </div>

    <script>
        const resultDiv = document.getElementById('health-results');

        // Standardized renderer that handles both API layout configurations smoothly
        function renderCards(topics) {
            if (!topics || topics.length === 0) {
                resultDiv.innerHTML = '<div class="loading">No matching medical briefs found. Try single terms like "Diabetes", "Heart", "Vaccine", or "Obesity".</div>';
                return;
            }

            resultDiv.innerHTML = '';
            topics.forEach(item => {
                const card = document.createElement('div');
                card.className = 'advice-card';
                
                // Safely match structural object parameters across types
                const headline = item.Title || 'Medical Guideline Update';
                const description = item.Notes || item.Teaser || 'Click below to review official resource materials.';
                const referenceLink = item.AccessibleVersion || '#';

                card.innerHTML = `
                    <h3 class="advice-heading">${headline}</h3>
                    <p class="advice-text">${description}</p>
                    <a class="advice-link" href="${referenceLink}" target="_blank">Read Full Official Guide &rarr;</a>
                `;
                resultDiv.appendChild(card);
            });
        }

        async function getRecommendations() {
            const age = document.getElementById('user-age').value;
            const sex = document.getElementById('user-sex').value;
            resultDiv.innerHTML = '<div class="loading">Compiling clinical guidelines...</div>';

            try {
                const res = await fetch(`/api/healthAdvice?type=recommendations&age=${age}&sex=${sex}`);
                const data = await res.json();
                
                // Accessing recommendations list format pathway
                const topics = data.Result?.MyHealthFinder?.ResultObjects?.ResultObject || [];
                renderCards(topics);
            } catch (err) {
                resultDiv.innerHTML = '<div class="loading" style="color: #ef4444;">Error accessing general guidelines.</div>';
            }
        }

        async function searchConditions() {
            const keyword = document.getElementById('search-keyword').value.trim();
            if(!keyword) return alert('Please input a condition or keyword first.');

            resultDiv.innerHTML = '<div class="loading">Searching health archives...</div>';

            try {
                const res = await fetch(`/api/healthAdvice?type=search&keyword=${keyword}`);
                const data = await res.json();
                
                // Read from data.Result.Topics.Topic if it's a keyword search return
                let topics = [];
                if (data.Result?.Topics?.Topic) {
                    topics = Array.isArray(data.Result.Topics.Topic) ? data.Result.Topics.Topic : [data.Result.Topics.Topic];
                } else if (data.Result?.MyHealthFinder?.ResultObjects?.ResultObject) {
                    topics = data.Result.MyHealthFinder.ResultObjects.ResultObject;
                }
                
                renderCards(topics);
            } catch (err) {
                resultDiv.innerHTML = '<div class="loading" style="color: #ef4444;">Error scanning library entries.</div>';
            }
        }
    </script>
</body>
    </html>
