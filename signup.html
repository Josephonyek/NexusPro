<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Pro - Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-950 text-white flex items-center justify-center min-h-screen font-sans">

    <div class="w-full max-w-md mx-4 bg-gray-900 border border-gray-800 rounded-2xl p-6 sm:p-8 shadow-2xl animate-fade-in">
        
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold tracking-wider bg-gradient-to-r from-blue-500 to-indigo-400 bg-clip-text text-transparent">
                NEXUS PRO
            </h1>
            <p class="text-gray-400 text-sm mt-1">Join the Student & Sports Community</p>
        </div>

        <div id="statusBanner" class="hidden mb-4 p-3 rounded-lg text-sm font-medium text-center transition-all duration-300"></div>

        <form id="signupForm" class="space-y-4">
            <div>
                <label for="fullName" class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1.5">
                    Full Name
                </label>
                <input type="text" id="fullName" required
                    class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                    placeholder="John Doe">
            </div>

            <div>
                <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1.5">
                    Email Address
                </label>
                <input type="email" id="email" required autocomplete="email"
                    class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                    placeholder="student@nexuspro.com">
            </div>

            <div>
                <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1.5">
                    Password (Min 6 Characters)
                </label>
                <input type="password" id="password" required minlength="6"
                    class="w-full px-4 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                    placeholder="••••••••">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 active:scale-[0.98] text-white font-bold rounded-xl shadow-lg shadow-blue-600/20 transition duration-150 flex items-center justify-center space-x-2">
                <span>Create Student Account</span>
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-400">
            Already have an account? 
            <a href="login.html" class="text-blue-400 font-medium hover:underline ml-1">Sign In</a>
        </div>

    </div>

    <script src="signup.js"></script>
</body>
</html>
