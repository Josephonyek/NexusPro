<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Nexus Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md p-8 bg-gray-900 rounded-3xl border border-gray-800">
        <h1 class="text-3xl font-black text-center mb-2">Create Account</h1>
        <p class="text-center text-gray-400 mb-8">Join Nexus Pro today</p>

        <form id="signupForm" class="space-y-5">
            <div>
                <label class="text-sm text-gray-400">Full Name</label>
                <input type="text" id="name" required
                       class="w-full mt-1 bg-gray-800 border border-gray-700 rounded-2xl px-4 py-3 focus:outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="text-sm text-gray-400">Email Address</label>
                <input type="email" id="email" required
                       class="w-full mt-1 bg-gray-800 border border-gray-700 rounded-2xl px-4 py-3 focus:outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="text-sm text-gray-400">Password</label>
                <input type="password" id="password" required minlength="6"
                       class="w-full mt-1 bg-gray-800 border border-gray-700 rounded-2xl px-4 py-3 focus:outline-none focus:border-blue-500">
            </div>

            <button type="submit"
                    class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 rounded-2xl font-bold text-lg transition">
                Create Account
            </button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-6">
            Already have an account? 
            <a href="login.html" class="text-blue-400 hover:underline">Log in</a>
        </p>
    </div>

    <script src="signup.js"></script>
</body>
    </html>
