<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Scores & Matches</title>
    <style>
        :root {
            --bg-color: #0f111a;
            --card-bg: #161925;
            --text-main: #ffffff;
            --text-muted: #8a90a6;
            --accent: #00e676;
            --border: #24293e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .dashboard-header {
            max-width: 800px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 { margin: 0; font-size: 1.8rem; color: var(--text-main); }

        select {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
        }

        .scores-grid {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .match-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            transition: transform 0.2s;
        }

        .match-card:hover {
            transform: translateY(-2px);
        }

        .match-status {
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .match-status.final {
            color: var(--text-muted);
        }

        .team-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .team-logo {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        .team-name {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .team-score {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .loading, .error-msg, .no-matches {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <h1>Live Match Hub</h1>
        <select id="league-selector">
            <option value="soccer/eng.1">⚽ Premier League</option>
            <option value="soccer/uefa.champions">⚽ Champions League</option>
            <option value="soccer/esp.1">⚽ La Liga</option>
            <option value="basketball/nba">🏀 NBA</option>
        </select>
    </div>

    <div id="scores-container" class="scores-grid">
        <div class="loading">Loading live fixtures...</div>
    </div>

    <script>
        const leagueSelector = document.getElementById('league-selector');
        const container = document.getElementById('scores-container');

        async function loadScores() {
            container.innerHTML = '<div class="loading">Updating latest scores...</div>';
            
            // Split the selector value into sport and league string parameters
            const [sport, league] = leagueSelector.value.split('/');

            try {
                // Call your internal Vercel Serverless Function Proxy
                const response = await fetch(`/api/scores?sport=${sport}&league=${league}`);
                if (!response.ok) throw new Error('Network response failure');
                
                const data = await response.json();
                const events = data.events || [];

                if (events.length === 0) {
                    container.innerHTML = '<div class="no-matches">No matches scheduled or active for today.</div>';
                    return;
                }

                container.innerHTML = ''; // Clear status wrapper

                events.forEach(match => {
                    const matchCard = document.createElement('div');
                    matchCard.className = 'match-card';

                    const statusText = match.status?.type?.detail || 'Scheduled';
                    const isFinal = match.status?.type?.completed;
                    
                    // Competitors list contains the home/away teams
                    const competitors = match.competitions?.[0]?.competitors || [];
                    
                    let teamsHTML = '';
                    competitors.forEach(competitor => {
                        const teamName = competitor.team?.displayName || 'Unknown Team';
                        const teamLogo = competitor.team?.logo || 'https://via.placeholder.com/30';
                        const score = competitor.score || '0';

                        teamsHTML += `
                            <div class="team-row">
                                <div class="team-info">
                                    <img class="team-logo" src="${teamLogo}" alt="${teamName}">
                                    <span class="team-name">${teamName}</span>
                                </div>
                                <div class="team-score">${score}</div>
                            </div>
                        `;
                    });

                    matchCard.innerHTML = `
                        <div class="match-status ${isFinal ? 'final' : ''}">${statusText}</div>
                        <div class="team-container">
                            ${teamsHTML}
                        </div>
                    `;
                    container.appendChild(matchCard);
                });

            } catch (error) {
                console.error('Error rendering match dashboard:', error);
                container.innerHTML = '<div class="error-msg">Failed to grab real-time data. Please check your configurations.</div>';
            }
        }

        // Event listeners for drop menu selection updates
        leagueSelector.addEventListener('change', loadScores);
        
        // Initial setup load
        loadScores();

        // Optional: Auto refresh every 30 seconds for live updates
        setInterval(loadScores, 30000);
    </script>
</body>
  </html>
