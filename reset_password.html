<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Pro | Reset Password Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-deep: #090d16;
            --glass-panel: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-green-glow: rgba(16, 185, 129, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; }
        .auth-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 24px; }
        .auth-card { width: 100%; max-width: 440px; padding: 40px; border-top: 4px solid var(--accent-green); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); }
        .glass { background: var(--glass-panel); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 12px; }
        .auth-header { text-align: center; margin-bottom: 25px; }
        .auth-icon-wrapper { width: 60px; height: 60px; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); color: var(--accent-green); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; margin: 0 auto 15px auto; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.82rem; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #64748b; }
        .form-control { width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); color: white; padding: 12px 16px 12px 42px; border-radius: 8px; font-size: 0.95rem; outline: none; }
        .form-control:focus { border-color: var(--accent-green); }
        .btn-submit { width: 100%; background: var(--accent-green); color: #000; border: none; padding: 13px; border-radius: 8px; font-weight: 600; font-size: 0.95rem; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .feedback-panel { padding: 14px; border-radius: 8px; font-size: 0.88rem; margin-bottom: 20px; display: none; align-items: flex-start; gap: 10px; }
        footer { background: var(--bg-deep); border-top: 1px solid var(--glass-border); padding: 20px; text-align: center; color: var(--text-muted); font-size: 0.82rem; }
    </style>
</head>
<body>

    <main class="auth-container">
        <div class="auth-card glass">
            <div class="auth-header">
                <div class="auth-icon-wrapper"><i class="fas fa-shield-keyhole"></i></div>
                <h1>Override Security Credentials</h1>
                <p>Input your new password parameters to finish access re-configurations.</p>
            </div>

            <div id="status-error" class="feedback-panel" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171;">
                <i class="fas fa-triangle-exclamation"></i><span id="error-text"></span>
            </div>
            
            <div id="status-success" class="feedback-panel" style="background: var(--accent-green-glow); border: 1px solid rgba(16, 185, 129, 0.2); color: #34d399;">
                <i class="fas fa-circle-check"></i><span id="success-text"></span>
            </div>

            <form id="reset-password-form" novalidate>
                <div class="form-group">
                    <label for="new-pass">New Password Key</label>
                    <div class="input-wrapper">
                        <input type="password" id="new-pass" class="form-control" placeholder="••••••••" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="btn-trigger">
                    <i class="fas fa-rotate"></i> Apply System Updates
                </button>
            </form>
        </div>
    </main>

    <footer>
        <div>&copy; 2026 Nexus Pro Platforms. Re-authentication console.</div>
    </footer>

    <script type="module">
        import { auth } from "./firebase-config.js";
        import { confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const urlParams = new URLSearchParams(window.location.search);
        const actionToken = urlParams.get('oobCode'); 

        const resetForm = document.getElementById("reset-password-form");
        const newPass = document.getElementById("new-pass");
        const btnTrigger = document.getElementById("btn-trigger");
        const errPanel = document.getElementById("status-error");
        const errText = document.getElementById("error-text");
        const succPanel = document.getElementById("status-success");
        const succText = document.getElementById("success-text");

        resetForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            errPanel.style.display = "none";
            succPanel.style.display = "none";

            const passVal = newPass.value.trim();

            if (!actionToken) {
                errText.innerText = "Security Override Error: Verification parameters missing.";
                errPanel.style.display = "flex";
                return;
            }

            if (passVal.length < 6) {
                errText.innerText = "Security Override Denied: Password must be 6 or more characters.";
                errPanel.style.display = "flex";
                return;
            }

            btnTrigger.disabled = true;
            btnTrigger.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Writing Database Updates...`;

            try {
                await confirmPasswordReset(auth, actionToken, passVal);
                
                succText.innerText = "Updates saved successfully. Rerouting to entry console...";
                succPanel.style.display = "flex";
                resetForm.reset();

                setTimeout(() => {
                    window.location.href = "login.html";
                }, 2000);
            } catch (error) {
                errText.innerText = `Update Failed: ${error.message}`;
                errPanel.style.display = "flex";
                btnTrigger.disabled = false;
                btnTrigger.innerHTML = `<i class="fas fa-rotate"></i> Apply System Updates`;
            }
        });
    </script>
</body>
    </html>
