<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Pro | Command Console</title>
    <!-- Icons for Navigation Panels -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Glassmorphic Dark Slate Theme styling rules */
        :root {
            --bg-dark: #0f172a;
            --glass-panel: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --neon-blue: #3b82f6;
            --neon-glow: rgba(59, 130, 246, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Fast Render Preloader CSS */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #090d16;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.3s ease-in-out, visibility 0.3s;
        }
        #preloader.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.05);
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-glow);
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Glassmorphism Structural Cards */
        .glass {
            background: var(--glass-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
        }

        /* Top Navigation Header Bar */
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 90;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-left: auto;
        }

        /* Notification Link styling */
        .bell-icon {
            color: var(--text-muted);
            font-size: 1.3rem;
            text-decoration: none;
            position: relative;
            transition: color 0.2s;
        }
        .bell-icon:hover { color: var(--neon-blue); }
        .notification-dot {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
        }

        #menu-toggle {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.4rem;
            cursor: pointer;
            display: none;
        }

        /* Side Navigation Tree Panel */
        .sidebar {
            position: fixed;
            top: 70px;
            left: 0;
            height: calc(100vh - 70px);
            width: 260px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .menu-link, .admin-link, .student-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .menu-link:hover, .admin-link:hover, .student-link:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
        }
        .menu-link.active {
            color: #ffffff;
            background: rgba(59, 130, 246, 0.15);
            border-left: 3px solid var(--neon-blue);
        }

        /* Category Header Titles */
        .role-divider {
            margin: 15px 10px 10px 10px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--neon-blue);
            font-weight: 700;
        }

        /* Workspace Grid Windows */
        .main-workspace {
            margin-left: 260px;
            padding: 110px 40px 40px 40px;
            min-height: 100vh;
        }

        .tab-content {
            display: none;
            animation: viewSlidIn 0.3s ease forwards;
        }
        .tab-content.active { display: block; }
        @keyframes viewSlidIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-card {
            padding: 25px;
            margin-bottom: 20px;
        }

        /* Responsiveness adjustments */
        @media (max-width: 768px) {
            #menu-toggle { display: block; }
            .sidebar {
                top: 70px;
                height: calc(100vh - 70px);
                transform: translateX(-100%);
                background: #090d16;
            }
            .sidebar.active { transform: translateX(0); }
            .main-workspace { margin-left: 0; padding: 100px 20px 20px 20px; }
        }
    </style>
</head>
<body>

    <!-- Ultra-Fast Preloader Screen -->
    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <!-- Upper Master Panel Header Bar -->
    <nav class="top-navbar">
        <button id="menu-toggle" title="Toggle Navigation Menu">
            <i class="fas fa-bars"></i>
        </button>
        <div class="brand-logo" style="font-weight:700; font-size:1.3rem; letter-spacing:0.5px;">
            <i class="fas fa-cubes" style="color: var(--neon-blue); margin-right: 6px;"></i>Nexus<span style="color:var(--neon-blue)">Pro</span>
        </div>
        
        <div class="header-actions">
            <!-- Notification Bell Anchor Linked to notifications.html -->
            <a href="notifications.html" class="bell-icon" title="View Notifications System">
                <i class="fas fa-bell"></i>
                <div class="notification-dot"></div>
            </a>
            <button onclick="handleSignOutAction()" style="background:none; border:none; color:var(--text-muted); cursor:pointer;" title="Secure Sign Out">
                <i class="fas fa-power-off"></i>
            </button>
        </div>
    </nav>

    <!-- Side Control Panel Deck -->
    <aside class="sidebar glass" id="sidebar">
        <!-- Client Student Modules Links -->
        <div class="role-divider student-controls">Student Hub</div>
        <nav class="nav-menu student-controls">
            <!-- Updated direct page configurations for student interfaces -->
            <a href="ai_solver.html" class="student-link"><i class="fas fa-robot"></i> AI Study &amp; Research</a>
            <a href="academy.html" class="student-link"><i class="fas fa-graduation-cap"></i> E-Library</a>
            <a href="health.html" class="student-link"><i class="fas fa-heartbeat"></i> Health Hub</a>
            <a class="menu-link active" data-tab="support-desk-tab"><i class="fas fa-headset"></i> Support Desk</a>
        </nav>

        <!-- Administrative Shortcut Router links -->
        <div class="role-divider admin-controls">Admin Controls</div>
        <nav class="nav-menu admin-controls">
            <a href="admin-users.html" class="admin-link"><i class="fas fa-users-cog"></i> User Management</a>
            <a href="broadcast.html" class="admin-link"><i class="fas fa-bullhorn"></i> Broadcast Engine</a>
            <a href="admin-upload.html" class="admin-link"><i class="fas fa-cloud-upload-alt"></i> E-Library Publisher</a>
        </nav>
    </aside>

    <!-- Core Content Workspaces -->
    <main class="main-workspace">
        <!-- Shared Support Tab Panel -->
        <section id="support-desk-tab" class="tab-content active">
            <div class="content-card glass">
                <h2>Support Desk Interactive Portal</h2>
                <p style="color:var(--text-muted); margin-top:10px;">Dispatch application support tickets directly to the platform administration console here.</p>
            </div>
        </section>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
