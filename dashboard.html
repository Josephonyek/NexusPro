<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Pro | Dashboard</title>
    <!-- Add your CSS styling here or link your stylesheet -->
    <style>
        /* Fast Preloader Styles */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #0f172a; /* Match your dashboard background */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.3s ease-in-out, visibility 0.3s; /* Snappy 0.3s transition */
        }
        #preloader.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6; /* Accent color */
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive Sidebar / Menu structural basics */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100%;
            width: 260px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
            z-index: 100;
        }
        /* Mobile hidden state */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.active {
                transform: translateX(0);
            }
        }
        
        /* Nav Menu Links */
        .menu-link {
            display: block;
            padding: 12px 20px;
            color: #94a3b8;
            text-decoration: none;
            cursor: pointer;
        }
        .menu-link.active {
            color: #fff;
            background: rgba(59, 130, 246, 0.2);
        }

        /* Dashboard Content Sections */
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>

    <!-- Fast Preloader -->
    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <!-- Mobile Hamburger Menu Button -->
    <button id="menu-toggle" aria-label="Toggle Navigation" style="position: fixed; top: 15px; left: 15px; z-index: 110;">
        ☰
    </button>

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
        <nav style="margin-top: 60px;">
            <a class="menu-link active" data-tab="overview">Overview</a>
            <a class="menu-link" data-tab="students">User Management</a>
            <a class="menu-link" data-tab="broadcast">Broadcast Engine</a>
            <a class="menu-link" data-tab="support">Support Desk</a>
        </nav>
    </aside>

    <!-- Main Content Containers -->
    <main style="margin-left: 270px; padding: 20px;" id="main-content">
        <section id="overview" class="tab-content active">
            <h2>Overview Dashboard</h2>
            <p>Welcome to Nexus Pro.</p>
        </section>
        
        <section id="students" class="tab-content">
            <h2>User Management</h2>
        </section>

        <section id="broadcast" class="tab-content">
            <h2>Broadcast Engine</h2>
        </section>

        <section id="support" class="tab-content">
            <h2>Support Desk</h2>
        </section>
    </main>

    <!-- Modular Script Initialization -->
    <script src="dashboard.js"></script>
</body>
    </html>
